name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  deploy-to-aks:
    strategy:
      matrix:
        org:
          - fintlabs-no
        cluster:
          - aks-beta-fint-2021-11-23
        component:
          - utdanning-elev
          - utdanning-vurdering
          - utdanning-utdanningsprogram
          - personvern-kodeverk
          - personvern-samtykke

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get environment
        uses: actions/github-script@v6
        id: environment
        with:
          script: return '${{ matrix.cluster }}'.split('-')[1]
          result-encoding: string

      - name: Get resource group name
        uses: actions/github-script@v6
        id: resource-group
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}'
          result-encoding: string

      - name: Check if kustomize path exists
        id: kustomize-check
        run: |
          KUSTOMIZE_PATH="kustomize/${{ steps.environment.outputs.result }}/${{ matrix.component }}/${{ matrix.org }}"

          echo "path=$KUSTOMIZE_PATH" >> $GITHUB_OUTPUT

          if [ -d "$KUSTOMIZE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found $KUSTOMIZE_PATH"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping $KUSTOMIZE_PATH (does not exist)"
          fi

      - name: Bake manifests with Kustomize
        if: steps.kustomize-check.outputs.exists == 'true'
        id: bake
        uses: azure/k8s-bake@v2.4
        with:
          renderEngine: kustomize
          kustomizationPath: ${{ steps.kustomize-check.outputs.path }}

      - uses: azure/login@v1
        with:
          creds: "${{ secrets[format('AKS_{0}_FINT_GITHUB', steps.environment.outputs.result)] }}"

      - uses: azure/use-kubelogin@v1.1
        with:
          kubelogin-version: v0.0.26

      - name: Set the target cluster
        uses: azure/aks-set-context@v3
        with:
          cluster-name: ${{ matrix.cluster }}
          resource-group: ${{ steps.resource-group.outputs.result }}
          admin: true
          use-kubelogin: true

      - name: Get latest RC image
        if: steps.kustomize-check.outputs.exists == 'true'
        id: image
        run: |
          IMAGE=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /users/fintlabs/packages/container/fint-core-consumer/versions \
            --paginate \
            --jq '
              .[]
              | .metadata.container.tags[]
              | select(contains("rc"))
            ' | sort -V | tail -n 1)

          echo "Found image tag: $IMAGE"

          echo "image=ghcr.io/fintlabs/fint-core-consumer:$IMAGE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy
        if: steps.kustomize-check.outputs.exists == 'true'
        uses: azure/k8s-deploy@v4.9
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}

          images: |
            ${{ steps.image.outputs.image }}

          namespace: ${{ matrix.org }}
