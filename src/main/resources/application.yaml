fint:
  security:
    opa:
      enabled: false
    exposed-endpoints:
      - /actuator/prometheus
      - /actuator/health
      - /actuator/health/readiness
      - /actuator/health/liveness

  relation:
    base-url: https://api.felleskomponent.no

  consumer:
    pod-url: http://fint-core-consumer-${fint.consumer.domain}-${fint.consumer.package}:8080
    base-url: ${fint.relation.base-url}
    domain: utdanning
    package: vurdering
    packageName: ${fint.consumer.package}
    org-id: ${fint.org-id}
    coreVersionHeader: 2
    health:
      kafka:
        idle-event-interval: 1m
        runtime-grace-period: 15m
        monitor-interval-seconds: 30
        no-poll-threshold: 3.0
    kafka:
      entity-concurrency: 6
      relation-concurrency: 6
      fetchMinBytes: 65536
      fetchMaxWaitMs: 10000

novari:
  kafka:
    topic:
      org-id: ${fint.org-id}
      domain-context: fint-core
    application-id: fint-core-consumer-${fint.consumer.domain}-${fint.consumer.package}-${fint.org-id}

spring:
  threads:
    virtual:
      enabled: true
  kafka:
    consumer:
      group-id: ${novari.kafka.application-id}

  webflux:
    base-path: ${fint.consumer.domain}/${fint.consumer.package}

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,initialKafkaBootstrap
        liveness:
          include: livenessState,kafkaRuntime

  endpoints:
    web:
      exposure:
        include: prometheus,health

logging:
  level:
      org.apache.kafka: WARN
      no.novari.kafka: WARN
