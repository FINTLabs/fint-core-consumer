apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: fint-core-consumer-utdanning-elev
  namespace: fintlabs-no
spec:
  replicas: 1
  port: 8080
  orgId: fintlabs.no
  image: ghcr.io/fintlabs/fint-core-consumer
  env:
    - name: fint.relation.base-url
      value: https://beta.felleskomponent.no
    - name: fint.consumer.domain
      value: utdanning
    - name: fint.consumer.package
      value: elev
    - name: fint.consumer.org-id
      value: fintlabs.no
    - name: fint.consumer.kafka.startup-jitter
      value: 0ms
    - name: JAVA_TOOL_OPTIONS
      value: |
        -XX:MaxRAMPercentage=80
        -XX:+ExitOnOutOfMemoryError
  ingress:
    routes:
      - host: beta.felleskomponent.no
        path: /utdanning/elev
        headers:
          x-org-id: fintlabs.no
  kafka:
    enabled: true
    acls:
      - topic: fintlabs-no.fint-core.*
        permission: admin
      - topic: fintlabs-no.fint-core.event.consumer-error
        permission: admin
      - topic: fintlabs-no.fint-core.event.completed-full-sync
        permission: read
      - topic: fintlabs-no.fint-core.entity.relation-update
        permission: read
      - topic: fintlabs-no.fint-core.event.sync-status
        permission: admin
      - topic: fintlabs-no.fint-core.event.relation-request
        permission: admin
  resources:
    limits:
      memory: 5Gi
    requests:
      memory: 1Gi
      cpu: 100m
  prometheus:
    enabled: true
    path: /utdanning/elev/actuator/prometheus
    port: "8080"
